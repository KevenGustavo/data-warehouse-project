services:
  sqlserver-dw:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_dw_instance
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD} 
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_system_data:/var/opt/mssql
      - ./datasets:/datasets:ro 
    networks:
      - dw_network

networks:
  dw_network:
    driver: bridge

volumes:
  sqlserver_system_data: